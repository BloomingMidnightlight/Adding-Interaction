<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showcase Card</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/svg/favicon.svg">
    <link rel="icon" type="image/png" href="assets/svg/favicon.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Smart Lamp</h1>
    </header>

    <div class="card">
        <img src="assets/images/smart-lamp.jpg" alt="Product Image">

        <p>A modern, energy-efficient smart lamp that adapts to your mood and environment.
        Designed for style, built for comfort.</p>

        <a href="#" class="btn">Learn More</a>
    </div>

    <div class="controls">
        <button id="toggleImageBtn" class="btn-alt">Switch Image</button>
        <button id="darkModeToggle" class="btn-alt">Toggle Dark Mode</button>
    </div>
    
    <script src="script.js" defer></script>

    <footer>
    <p>&copy; 2026 Smart Lamp Co. All rights reserved.</p>
    </footer>
</body>

</html>
